<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EasyUi</title>
  <style>
    /* ===== الأساسيات ===== */
    :root {
      --bg-primary: #fff;
      --bg-secondary: #f4f4f4;
      --bg-tertiary: #fafafa;
      --text-primary: #333;
      --text-secondary: #666;
      --border-color: #dbdbdb;
      --border-light: #e6e6e6;
      --shadow-color: rgba(0,0,0,0.1);
      --bubble-user: #e3f2ec;
      --bubble-user-text: #064e3b;
      --bubble-assistant: #fafafa;
      --bubble-assistant-border: #e6e6e6;
      --bubble-assistant-text: #212121;
      --input-bg: #fff;
      --menu-bg: #fff;
      --hover-bg: #f5f5f5;
    }
    
    body.dark-mode {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --bg-tertiary: #252525;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --border-color: #404040;
      --border-light: #353535;
      --shadow-color: rgba(0,0,0,0.5);
      --bubble-user: #1e4d3a;
      --bubble-user-text: #a7f3d0;
      --bubble-assistant: #2d2d2d;
      --bubble-assistant-border: #404040;
      --bubble-assistant-text: #e0e0e0;
      --input-bg: #2d2d2d;
      --menu-bg: #252525;
      --hover-bg: #333;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* زرّ اختيار الفرع */
    #modeWrap {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
    }
    #modeBtn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    #modeMenu {
      display: none;
      position: absolute;
      top: 46px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 10px;
      box-shadow: 0 4px 12px #0003;
    }
    #modeMenu div {
      padding: 10px 22px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #modeMenu div:hover {
      background: #f2f2f2;
    }

    /* منطقة الدردشة */
    #chat {
      padding: 90px 20px 94px;
      max-width: 850px;
      margin: auto;
      height: 100%;
      overflow-y: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .msg {
      max-width: 75%;
      display: flex;
      font-size: 1rem;
      line-height: 1.5;
    }
    .user {
      align-self: flex-end;
      justify-content: flex-end;
    }
    .assistant {
      align-self: flex-start;
      justify-content: flex-start;
    }
    .bubble {
      position: relative;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      background: var(--bubble-user);
      color: var(--bubble-user-text);
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 6px var(--shadow-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .assistant .bubble {
      background: var(--bubble-assistant);
      border: 1px solid var(--bubble-assistant-border);
      color: var(--bubble-assistant-text);
      border-radius: 18px 18px 18px 4px;
      padding: 4px 4px 36px;
    }
    .bubble img, .bubble video {
      max-width: 100%;
      max-height: 400px;
      border-radius: 12px;
      object-fit: contain;
      cursor: zoom-in;
    }
    .bubble audio {
      width: 100%;
      min-width: 250px;
    }

    /* زر إعادة توليد المساعد */
    .regen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: #10a37fcc;
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 6px #10a37faa;
    }
    .regen-btn:hover {
      background: #10a37f;
    }

    /* زر إعادة الإرسال للمستخدم */
    .user-regen-btn {
      position: absolute;
      top: -14px;
      right: 8px;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #8888;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 4px #0004;
    }
    .user-regen-btn:hover {
      background: #666;
    }

    /* زر تحرير (قلم) للمستخدم */
    .user-edit-btn {
      position: absolute;
      top: -14px;
      right: 40px; /* إلى يسار زر الإعادة */
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #ffa726cc;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 4px #0004;
    }
    .user-edit-btn:hover {
      background: #fb8c00;
    }

    /* سبينر دوار */
    .spinner {
      width: 24px;
      height: 24px;
      border: 4px solid #e6e6e6;
      border-top-color: #10a37f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* فقاعة انتظار بدون ظل ونص */
    .wait-bubble .bubble {
      padding: 12px;
      background: transparent;
      box-shadow: none;
    }

    /* ===== composer + زر التبديل ===== */
    #composerWrap {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 20px;
      transition: bottom .25s ease;
      z-index: 120;
      width: calc(100% - 32px);
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #composer {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 26px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px var(--shadow-color);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    #composer.drag-over {
      border-color: #10a37f;
      box-shadow: 0 0 0 3px #10a37f44, 0 4px 12px #0002;
      background: #f0fff8;
    }
    .icon-btn {
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #666;
    }
    .icon-btn:hover {
      background: #f4f4f4;
    }
    #mainInput {
      flex: 1;
      min-height: 34px;
      height: 34px;
      max-height: calc(1.5em * 7 + 12px);
      resize: none;
      overflow-y: auto;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text-primary);
      cursor: text;
      padding: 5px 0;
    }
    #sendBtn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      font-size: 17px;
      cursor: pointer;
    }
    #sendBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    #tplToggle {
      width: 110px;
      height: 20px;
      border: none;
      border-radius: 0 0 10px 10px;
      background: #10a37f;
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      margin-top: 3px;
      box-shadow: 0 2px 6px #0002;
    }

    /* رفع ملف */
    #fileInput {
      display: none;
    }
    #filePreviews {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .file-preview {
      position: relative;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px;
      background: #f9f9f9;
    }
    .file-preview img, .file-preview video {
      max-width: 60px;
      max-height: 60px;
      border-radius: 4px;
    }
    .file-preview .file-info {
      font-size: 10px;
      text-align: center;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60px;
    }
    .file-preview .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f44336;
      color: white;
      border: none;
      font-size: 10px;
      cursor: pointer;
    }
    .file-preview .crop-btn {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #2196F3;
      color: white;
      border: none;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-preview .crop-btn:hover {
      background: #1976D2;
    }
    .audio-preview {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      border-radius: 4px;
    }
    .audio-preview::before {
      content: "🔊";
      font-size: 24px;
    }

    /* ===== شريط القوالب ===== */
    #templatesRow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 20px;
      background: #f4f4f4e6;
      box-shadow: 0 -2px 8px #0002;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      max-height: 0;
      transition: max-height .25s ease;
      z-index: 110;
    }
    #templatesRow.open {
      max-height: 130px;
    }
    #templatesSlider {
      display: flex;
      gap: 22px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding: 14px;
    }
    .template-btn {
      width: 90px;
      height: 90px;
      border: 2px solid #e6e6e6;
      border-radius: 16px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: border .2s, box-shadow .2s;
    }
    .template-btn img {
      width: 78px;
      height: 78px;
      border-radius: 14px;
      object-fit: cover;
    }
    .template-btn.selected {
      border: 3px solid #10a37f;
      box-shadow: 0 0 0 2px #10a37f55;
    }
    .template-btn.folder::after {
      content: "📂";
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 18px;
    }
    .template-btn .tick {
      position: absolute;
      bottom: 6px;
      left: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: bold;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px #10a37f66;
    }

    /* ===== Lightbox ===== */
    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    #lightbox.open {
      display: flex;
    }
    #lightbox img, #lightbox video {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      cursor: zoom-out;
      transition: transform .2s ease;
    }
    #lightbox .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      padding: 0 20px;
      user-select: none;
    }
    #lightbox .nav.prev {
      left: 10px;
    }
    #lightbox .nav.next {
      right: 10px;
    }
    #lightbox .close {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    /* ===== نافذة القص ===== */
    #cropModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
    }
    #cropModal.open {
      display: flex;
    }
    #cropBox {
      background: #fff;
      padding: 8px;
      border-radius: 10px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #cropCanvas {
      max-width: 80vw;
      max-height: 70vh;
      border: 1px solid #ccc;
      touch-action: none;
      cursor: crosshair;
    }
    .crop-actions {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .crop-actions button {
      min-width: 80px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    .crop-ok {
      background: #10a37f;
      color: #fff;
    }
    .crop-mask {
      background: #ff9800;
      color: #fff;
    }
    .crop-mask:hover {
      background: #f57c00;
    }
    .crop-cancel {
      background: #999;
      color: #fff;
    }

    /* ===== مودال مجلدات القوالب ===== */
    #tplFolderModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 260;
    }
    #tplFolderModal.open {
      display: flex;
    }
    #tplFolderBox {
      background: #fff;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px #0008;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #tplFolderHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    #tplFolderHeader h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin: 0;
      padding: 0;
    }
    #tplFolderClose {
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }
    #tplFolderGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px,1fr));
      gap: 16px;
      width: 100%;
    }
    .tpl-folder-item {
      border: 2px solid #e6e6e6;
      border-radius: 12px;
      background: #eee;
      padding: 4px;
      cursor: pointer;
      position: relative;
      transition: border .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
    }
    .tpl-folder-item:hover {
      border-color: #10a37f;
      box-shadow: 0 0 0 2px #10a37f44;
    }
    .tpl-folder-item img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }
    .tpl-folder-item .lbl {
      font-size: 13px;
      text-align: center;
      color: #333;
      padding: 2px 4px;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tpl-folder-item.selected::after {
      content: "✔";
      position: absolute;
      bottom: 6px;
      left: 6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px #10a37f66;
    }

    /* ===== مودال تعديل رسالة ===== */
    #editMsgModal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.65);
      z-index: 400;
    }
    #editMsgBox {
      background: #fff;
      max-width: 90vw;
      width: 420px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px #0008;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #editMsgBox h3 {
      margin: 0;
      font-size: 1.05rem;
    }
    #editMsgInput {
      width: 100%;
      resize: vertical;
      font-size: 1rem;
      padding: 8px;
      rows: 4;
    }
    #editMsgIncludeImgs {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .95rem;
    }
    #editMsgIncludeImgs input {
      margin: 0;
    }
    #editMsgCancel {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #999;
      color: #fff;
      cursor: pointer;
    }
    #editMsgSend {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: #10a37f;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== أزرار المستخدمين والجلسات ===== */
    .user-menu-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sessions-menu-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: #10a37f;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-menu, .sessions-menu {
      position: fixed;
      top: 62px;
      width: 300px;
      max-height: 70vh;
      background: var(--menu-bg);
      border-radius: 10px;
      box-shadow: 0 4px 12px var(--shadow-color);
      z-index: 210;
      display: none;
      flex-direction: column;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }
    .user-menu {
      right: 18px;
    }
    .sessions-menu {
      left: 18px;
    }
    .menu-header {
      padding: 12px 16px;
      background: #10a37f;
      color: #fff;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-close {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    .menu-content {
      padding: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .menu-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-item:hover {
      background: var(--hover-bg);
    }
    .menu-item.active {
      background: #e3f2ec;
    }
    .menu-item .icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-item .label {
      flex: 1;
    }
    .menu-item .badge {
      background: #10a37f;
      color: #fff;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 12px;
    }
    .menu-footer {
      padding: 12px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
    }
    .menu-footer button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #10a37f;
      color: #fff;
      cursor: pointer;
    }
    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .settings-form label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .settings-form input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .settings-form input[type="checkbox"] {
      margin: 0;
    }
    .settings-form select {
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

<div id="easy-tag-settings-block" style="margin:10px 0; display:flex; flex-direction:column; gap:8px;">
  <label style="display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="cbTagAutocomplete">
    <span data-i18n="easy_tag.enable_autocomplete">تشغيل إكمال التاقات</span>
  </label>
  <label style="display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="cbTagMergeQuality">
    <span data-i18n="easy_tag.merge_quality">دمج تاقات الجودة</span>
  </label>
  <label style="display:flex;align-items:center;gap:8px;">
    <span data-i18n="easy_tag.tags_file">ملف التاقات:</span>
    <select id="tagSourceSelect" style="min-width:220px"></select>
  </label>
  <label style="display:flex;align-items:center;gap:8px;">
    <span data-i18n="easy_tag.chants_file">ملف الـ Chants:</span>
    <select id="chantSourceSelect" style="min-width:220px"></select>
  </label>
</div>

<script>
(function(){
  function qs(s, r){ return (r||document).querySelector(s); }
  function loadSettings(){
    try{ return JSON.parse(localStorage.getItem('easyTagSettings:guest')||'{}'); }catch(e){ return {}; }
  }
  function saveSettings(s){
    try{ localStorage.setItem('easyTagSettings:guest', JSON.stringify(s)); }catch(e){}
    var evt = new CustomEvent('easyTagSettingsChanged', { detail: s });
    document.dispatchEvent(evt);
  }
  function attachBlock(){
    var block = document.getElementById('easy-tag-settings-block');
    if (!block) return;
    var form = qs('.user-menu .menu-content .settings-form') || qs('.settings-form') || qs('#user-settings') || qs('#settings');
    if (form && !form.contains(block)) form.appendChild(block);
  }
  function applySelectValue(select, value){
    var v = value || '';
    for (var i=0;i<select.options.length;i++){
      if (select.options[i].value === v){ select.selectedIndex = i; return; }
    }
  }
  function fillSelect(select, list, current){
    select.innerHTML='';
    if (!list || !list.length){
      var opt = document.createElement('option');
      opt.value='';
      opt.textContent = (window.t ? window.t('common.no_files', 'لا توجد ملفات') : 'لا توجد ملفات');
      select.appendChild(opt);
      return;
    }
    list.forEach(function(f){
      var opt = document.createElement('option'); opt.value=f; opt.textContent=f; select.appendChild(opt);
    });
    if (current && current.indexOf('/')>=0) current = current.split('/').pop();
    applySelectValue(select, current || list[0] || '');
  }
  async function fetchJSON(url){
    var r = await fetch(url, {cache:'no-cache'});
    if (!r.ok) throw new Error('status '+r.status);
    return r.json();
  }
  async function getTagList(){
    try{ var a = await fetchJSON('/api/easy-tag/files'); if (a && Array.isArray(a.tags) && a.tags.length){ localStorage.setItem('easyTagKnownFiles', JSON.stringify(a.tags)); return a.tags; } }catch(e){}
    try{ var m = await fetchJSON('/easy-tag/tags/_manifest.json'); if (m && Array.isArray(m.tags) && m.tags.length){ localStorage.setItem('easyTagKnownFiles', JSON.stringify(m.tags)); return m.tags; } }catch(e){}
    try{ var c = JSON.parse(localStorage.getItem('easyTagKnownFiles')||'[]'); if (c && c.length) return c; }catch(e){}
    var cur = (window.userSettings && window.userSettings.tag_source_main) || '';
    if (cur && cur.indexOf('/')>=0) cur = cur.split('/').pop();
    return cur ? [cur] : [];
  }
  async function getChantList(){
    try{ var a = await fetchJSON('/api/easy-tag/chant-files'); if (a && Array.isArray(a.chants) && a.chants.length){ localStorage.setItem('easyChantKnownFiles', JSON.stringify(a.chants)); return a.chants; } }catch(e){}
    try{ var m = await fetchJSON('/easy-tag/chants/_manifest.json'); if (m && Array.isArray(m.chants) && m.chants.length){ localStorage.setItem('easyChantKnownFiles', JSON.stringify(m.chants)); return m.chants; } }catch(e){}
    try{ var c = JSON.parse(localStorage.getItem('easyChantKnownFiles')||'[]'); if (c && c.length) return c; }catch(e){}
    var cur = (window.userSettings && window.userSettings.chant_source_main) || '';
    if (cur && cur.indexOf('/')>=0) cur = cur.split('/').pop();
    return cur ? [cur] : [];
  }
  async function init(){
    attachBlock();
    var s = loadSettings();
    var cbAuto = document.getElementById('cbTagAutocomplete');
    var cbMerge = document.getElementById('cbTagMergeQuality');
    var selTags = document.getElementById('tagSourceSelect');
    var selChants = document.getElementById('chantSourceSelect');

    if (cbAuto){ cbAuto.checked = !!s.enable_tag_autocomplete; cbAuto.onchange = function(){ var cur = loadSettings(); cur.enable_tag_autocomplete = !!cbAuto.checked; saveSettings(cur); }; }
    if (cbMerge){ cbMerge.checked = !!s.tag_include_extra_quality; cbMerge.onchange = function(){ var cur = loadSettings(); cur.tag_include_extra_quality = !!cbMerge.checked; saveSettings(cur); }; }

    var tagList = await getTagList();
    if (selTags){ fillSelect(selTags, tagList, (s.tag_source_main || '').split('/').pop()); selTags.onchange = function(){ var cur = loadSettings(); var v = selTags.value || ''; cur.tag_source_main = v ? ('easy-tag/tags/' + v) : ''; saveSettings(cur); }; }

    var chantList = await getChantList();
    if (selChants){ fillSelect(selChants, chantList, (s.chant_source_main || '').split('/').pop()); selChants.onchange = function(){ var cur = loadSettings(); var v = selChants.value || ''; cur.chant_source_main = v ? ('easy-tag/chants/' + v) : ''; saveSettings(cur); }; }
  }
  document.addEventListener('DOMContentLoaded', function(){
    attachBlock();
    var mo = new MutationObserver(attachBlock);
    mo.observe(document.body, {subtree:true, childList:true});
    init();
  });
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const delBtn = document.getElementById('deleteAllMediaBtn');
  if (delBtn) {
    delBtn.addEventListener('click', async function(){
      const usernameInput = document.getElementById('usernameInput');
      const username = (usernameInput && usernameInput.value.trim()) || 'guest';
      const confirmMsg = (window.t
        ? window.t('settings.confirm_delete_all_media', 'سيتم حذف جميع الوسائط المذكورة في media_paths.txt لهذا المستخدم. هل أنت متأكد؟')
        : 'سيتم حذف جميع الوسائط المذكورة في media_paths.txt لهذا المستخدم. هل أنت متأكد؟');
      if (!confirm(confirmMsg)) return;
      try {
        const r = await fetch('/api/user/delete_all_media', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username})
        });
        const j = await r.json();
        if (!j.success) throw new Error(j.error || ('HTTP '+r.status));
        
        // مسح كاش المتصفح للوسائط المحذوفة
        try {
          // مسح كاش الصور من الذاكرة
          if (Array.isArray(window.chatMedia)) {
            window.chatMedia = [];
          }
          
          // مسح Cache API إذا كان متاحاً
          if ('caches' in window) {
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
              const cache = await caches.open(cacheName);
              const requests = await cache.keys();
              for (const request of requests) {
                const url = request.url;
                // حذف الصور من /uploads/ و /media/
                if (url.includes('/uploads/') || url.includes('/media/')) {
                  await cache.delete(request);
                }
              }
            }
          }
          
          // إفراغ ذاكرة الصور المحملة
          const imgs = document.querySelectorAll('img[src*="/uploads/"], img[src*="/media/"]');
          imgs.forEach(img => {
            img.src = '';
            img.removeAttribute('src');
          });
        } catch(cacheErr) {
          console.warn('فشل مسح الكاش:', cacheErr);
        }
        
        const okMsg = (window.t
          ? window.t('settings.delete_done', 'تم الحذف.\nالمحذوف: {deleted}\nغير موجود: {missing}\nفشل: {failed}\n\nتم مسح الكاش أيضاً', {
              deleted: j.deleted_count,
              missing: j.missing_count,
              failed: j.failed_count
            })
          : ('تم الحذف.\nالمحذوف: ' + j.deleted_count + '\nغير موجود: ' + j.missing_count + '\nفشل: ' + j.failed_count + '\n\nتم مسح الكاش أيضاً'));
        alert(okMsg);
        
        // إعادة تحميل الصفحة لتطبيق التغييرات
        location.reload();
      } catch(e) {
        const errMsg = (window.t
          ? window.t('settings.delete_failed', 'فشل الحذف: {message}', { message: e.message })
          : ('فشل الحذف: ' + e.message));
        alert(errMsg);
      }
    });
  }
});
</script>
